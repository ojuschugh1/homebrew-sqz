name: Update sqz formula

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out tap
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Update formula from latest release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ruby .github/scripts/update_formula.rb

      - name: Check Ruby syntax
        run: ruby -c Formula/sqz.rb

      - name: Open update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/update-sqz-formula
          title: Update sqz formula
          commit-message: Update sqz formula
          body: |
            Automated update from the latest ojuschugh1/sqz GitHub release.

            This refreshes release URLs and SHA256 checksums for all supported Homebrew platforms.
